version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: roomiemanager-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roomie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomie}
      POSTGRES_DB: ${POSTGRES_DB:-roomiemanager}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - roomiemanager_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-roomie} -d ${POSTGRES_DB:-roomiemanager}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  roomiemanager_postgres_data:
