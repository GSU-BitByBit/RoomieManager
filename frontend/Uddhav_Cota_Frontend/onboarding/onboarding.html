<!DOCTYPE html>
<html>
<head>
  <title>Roomie Manager</title>
  <link rel="stylesheet" href="onboarding.css">
</head>
<body>

  <div class="container">
    <div class="logo">🏠</div>
    <h1>Roomie Manager</h1>
    <p class="subtitle">Manage your shared living space — chores, bills, and rules — all in one place.</p>

    <div class="options">
      <div class="card" id="createGroup">
        <div class="card-icon">✨</div>
        <h3>Create a Group</h3>
        <p>Start a new household and invite your roommates</p>
        <span class="card-arrow">→</span>
      </div>

      <div class="card" id="joinGroup">
        <div class="card-icon">🔑</div>
        <h3>Join a Group</h3>
        <p>Enter a code to join an existing household</p>
        <span class="card-arrow">→</span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("createGroup").addEventListener("click", () => {
      window.location.href = "/Uddhav_Cota_Frontend/create-group/create-group.html";
    });

    document.getElementById("joinGroup").addEventListener("click", () => {
      window.location.href = "/Uddhav_Cota_Frontend/join-group/join-group.html";
    });
  </script>

</body>
</html>
