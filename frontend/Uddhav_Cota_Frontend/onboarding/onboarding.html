<!DOCTYPE html>
<html>
<head>
  <title>Roomie Manager</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="onboarding.css">
  <link rel="stylesheet" href="/shared/theme.css">
</head>
<body>

  <div class="container">
    <div class="logo"><i class="fa-solid fa-house"></i></div>
    <h1>Roomie Manager</h1>
    <p class="subtitle">Manage your shared living space — chores, bills, and rules — all in one place.</p>

    <div class="options">
      <div class="card" id="createGroup">
        <div class="card-icon"><i class="fa-solid fa-people-roof"></i></div>
        <h3>Create a Group</h3>
        <p>Start a new household and invite your roommates</p>
        <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
      </div>

      <div class="card" id="joinGroup">
        <div class="card-icon"><i class="fa-solid fa-key"></i></div>
        <h3>Join a Group</h3>
        <p>Enter a code to join an existing household</p>
        <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("createGroup").addEventListener("click", () => {
      window.location.href = "/Uddhav_Cota_Frontend/create-group/create-group.html";
    });

    document.getElementById("joinGroup").addEventListener("click", () => {
      window.location.href = "/Uddhav_Cota_Frontend/join-group/join-group.html";
    });
  </script>

</body>
</html>
