<!DOCTYPE html>
<html>
<head>
  <title>Create Group - Roomie Manager</title>
  <link rel="stylesheet" href="create-group.css">
</head>

<body>

  <div class="container">
    <a href="../onboarding/onboarding.html" class="back-link">← Back</a>
    <div class="form-card">
      <div class="form-icon">✨</div>
      <h1>Create a Group</h1>
      <p class="hint">Give your household a name to get started</p>

      <div class="input-group">
        <label for="groupName">Group Name</label>
        <input
          type="text"
          id="groupName"
          placeholder="e.g. Apartment 12A"
          maxlength="40"
        />
      </div>

      <button id="createBtn">
        <span class="btn-text">Create Group</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <script src="create-group.js"></script>

</body>
</html>
