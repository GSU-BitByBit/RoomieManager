<!DOCTYPE html>
<html>
<head>
  <title>Roomie Manager</title>
  <link rel="stylesheet" href="app-shell.css">
</head>

<body>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">🏠</span>
        <h2>Roomie</h2>
      </div>

      <nav>
        <a href="#" class="nav-link active" onclick="loadPage('dashboard'); return false;">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="#" class="nav-link" onclick="loadPage('members'); return false;">
          <span class="nav-icon">👥</span> Members
        </a>
        <a href="#" class="nav-link" onclick="loadPage('chores'); return false;">
          <span class="nav-icon">🧹</span> Chores
        </a>
        <a href="#" class="nav-link" onclick="loadPage('bills'); return false;">
          <span class="nav-icon">💰</span> Bills
        </a>
        <a href="#" class="nav-link" onclick="loadPage('contract'); return false;">
          <span class="nav-icon">📝</span> Contract
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="nav-link" onclick="loadPage('settings'); return false;">
          <span class="nav-icon">⚙️</span> Settings
        </a>
      </div>
    </aside>

    <!-- Main content -->
    <div class="main">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <h3 class="page-title" id="pageTitle">Dashboard</h3>
        </div>
        <div class="topbar-right">
          <div class="group-name-badge">
            <span class="badge-icon">🏠</span>
            <span class="group-name">Apartment 12A</span>
          </div>
          <div class="join-code-badge" title="Click to copy">
            <span class="code-label">Code:</span>
            <span class="code-value">ABC123</span>
          </div>
        </div>
      </header>

      <!-- Dynamic content area -->
      <section class="content" id="content"></section>

    </div>

  </div>

  <script src="app-shell.js"></script>

</body>
</html>
