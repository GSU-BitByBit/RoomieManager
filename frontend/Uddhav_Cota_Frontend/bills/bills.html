<!DOCTYPE html>
<html>
<head>
  <title>Bills - Roomie Manager</title>
  <link rel="stylesheet" href="bills.css">
</head>

<body>

  <div class="container">
    <div class="page-header">
      <h1>💰 Bills</h1>
      <p>Track shared expenses and split costs with your roommates</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-icon">💳</span>
        <h3>Total Unpaid</h3>
        <div class="stat-value">$165.50</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">👤</span>
        <h3>Your Share</h3>
        <div class="stat-value">$41.38</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>All Bills</h2>
        <button class="btn btn-primary">+ Add Bill</button>
      </div>
      <div class="panel-body">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>Connect through the app shell to see bills</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
