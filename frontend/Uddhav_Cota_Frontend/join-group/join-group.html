<!DOCTYPE html>
<html>
<head>
  <title>Join Group - Roomie Manager</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="join-group.css">
  <link rel="stylesheet" href="/shared/theme.css">
</head>
<body>

  <div class="container">
    <a href="/Uddhav_Cota_Frontend/onboarding/onboarding.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <div class="form-card">
      <div class="form-icon"><i class="fa-solid fa-key"></i></div>
      <h1>Join a Group</h1>
      <p class="hint">Enter the invite code shared by your roommate</p>

      <div class="input-group">
        <label for="joinCode">Join Code</label>
        <input type="text" id="joinCode" placeholder="e.g. ABC123" maxlength="20"/>
      </div>

      <button id="joinBtn">
        <span class="btn-text">Join Group</span>
        <span class="btn-arrow"><i class="fa-solid fa-arrow-right"></i></span>
      </button>
    </div>
  </div>

  <script src="/shared/ui-feedback.js"></script>
  <script src="../../samia_frontend/auth/api.js"></script>
  <script src="join-group.js"></script>

</body>
</html>
