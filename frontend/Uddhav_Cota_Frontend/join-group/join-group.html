<!DOCTYPE html>
<html>
<head>
  <title>Join Group - Roomie Manager</title>
  <link rel="stylesheet" href="join-group.css">
</head>
<body>

  <div class="container">
    <a href="/Uddhav_Cota_Frontend/onboarding/onboarding.html" class="back-link">← Back</a>
    <div class="form-card">
      <div class="form-icon">🔑</div>
      <h1>Join a Group</h1>
      <p class="hint">Enter the invite code shared by your roommate</p>

      <div class="input-group">
        <label for="joinCode">Join Code</label>
        <input type="text" id="joinCode" placeholder="e.g. ABC123" maxlength="20"/>
      </div>

      <button id="joinBtn">
        <span class="btn-text">Join Group</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <script src="../../samia_frontend/auth/api.js"></script>
  <script src="join-group.js"></script>

</body>
</html>
