<!-- frontend/samia_frontend/auth/login.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/shared/theme.css">
</head>
<body>

<div class="container">
  <h1><i class="fa-solid fa-house"></i> Welcome Back</h1>
  <p>Login to your Roomie Manager account</p>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p id="error" style="color:red;"></p>
  <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
</div>

<script src="api.js"></script>
<script src="/shared/ui-feedback.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const errorEl = document.getElementById("error");
  errorEl.innerText = "";

  try {
    const data = await apiRequest("/auth/login", "POST", {
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    });

    localStorage.setItem("accessToken", data.session.accessToken);
    localStorage.setItem("userId", data.user.id);

    // Redirect: if first login → onboarding, else dashboard
    if (data.isNewUser) {
      window.location.href = "../../Uddhav_Cota_Frontend/onboarding/onboarding.html";
    } else {
      window.location.href = "../../Uddhav_Cota_Frontend/app-shell/app-shell.html";
    }

  } catch (err) {
    errorEl.innerText = err.message;
  }
});
</script>

</body>
</html>
