<!-- frontend/samia_frontend/auth/signup.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/shared/theme.css">
</head>
<body>

<div class="container">
  <h1><i class="fa-solid fa-user-plus"></i> Create Account</h1>
  <p>Sign up for Roomie Manager</p>

  <form id="signupForm">
    <input type="text" id="fullName" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>

  <p id="error" style="color:red;"></p>
  <p>Already have an account? <a href="login.html">Login here</a></p>
</div>

<script src="api.js"></script>
<script src="/shared/ui-feedback.js"></script>
<script>
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const errorEl = document.getElementById("error");
  errorEl.innerText = "";

  try {
    // 1. Register user
    await apiRequest("/auth/register", "POST", {
      fullName: document.getElementById("fullName").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    });

    // 2. Auto login after signup
    const loginData = await apiRequest("/auth/login", "POST", {
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    });

    localStorage.setItem("accessToken", loginData.session.accessToken);
    localStorage.setItem("userId", loginData.user.id);

    // Redirect to onboarding after first signup
    window.location.href = "../../Uddhav_Cota_Frontend/onboarding/onboarding.html";

  } catch (err) {
    errorEl.innerText = err.message || "Something went wrong";
  }
});
</script>

</body>
</html>
