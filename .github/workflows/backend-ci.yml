name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: 3001
      API_PREFIX: api/v1
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_JWT_AUDIENCE: ${{ secrets.SUPABASE_JWT_AUDIENCE }}
      LOG_LEVEL: info
      CORS_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Validate Supabase database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing SUPABASE_DATABASE_URL secret."
            exit 1
          fi

          if echo "$DATABASE_URL" | grep -Eq '@db\\.[^.]+\\.supabase\\.co:5432'; then
            echo "::error::SUPABASE_DATABASE_URL is using direct host (db.<project-ref>.supabase.co:5432)."
            echo "::error::Use Supabase session pooler host on :5432 instead (aws-1-<region>.pooler.supabase.com:5432) with user postgres.<project-ref>."
            exit 1
          fi

          if ! echo "$DATABASE_URL" | grep -q 'pooler\\.supabase\\.com:5432'; then
            echo "::warning::SUPABASE_DATABASE_URL does not look like a Supabase session pooler URL on :5432."
          fi

          if ! echo "$DATABASE_URL" | grep -q 'sslmode=require'; then
            echo "::warning::SUPABASE_DATABASE_URL is missing sslmode=require."
          fi

      - name: Run migrations
        run: pnpm prisma:migrate:deploy

      - name: Verify (lint + tests + build + OpenAPI contract)
        run: pnpm verify
